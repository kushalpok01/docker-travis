# sudo: required
services:
  - docker

before_install:
  - docker build -t kushalpok01/docker-react -f Dockerfile.dev .


script:
  - docker run -e CI=true kushalpok01/docker-react npm run test -- --coverage


deploy:
  provider: elasticbeanstalk
  region: "eu-north-1"
  app: "docker-react"
  env: "Docker-react-env"
  bucket_name: "elasticbeanstalk-eu-north-1-795176248030"
  bucket_path: "docker-react"
  on:
    branch: master
  access_key_id: "$AWS_ACCESS_KEY"
  secret_access_key: "$AWS_SECRET_KEY"
